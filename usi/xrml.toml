host = "127.0.0.1"
port = 8080
templates_path = "templates"
static_path = "static"
site_name = "Unsuspicious Industries"
site_description = "An open multidisciplinary research collective"
favicon = "/static/favicon.ico"

# Pages with no <?load?> of their own are wrapped in this layout, with these
# imports loaded ahead of it — so a page is just its <?block?> fills.
[templates]
layout = "layouts/base.hrml"
imports = ["_imports.hrml"]

[globals]
primary = "#1f2937"
secondary = "#1f2937"
accent = "#3730a3"
text_heading = "#3730a3"
text_default = "#1f2937"
text_muted = "#6b7280"
border = "#e5e7eb"
bg_page = "#ffffff"
bg_section = "#f8fafc"
brand_accent_1 = "#54005b"
brand_accent_2 = "#06b6d4"
font_mono = "'Hack', 'Fira Mono', 'Liberation Mono', monospace"
font_serif = "'Libre Baskerville', 'Crimson Text', 'Georgia', serif"
font_typewriter = "'Nazi Typewriter', 'Special Elite', 'Courier Prime', monospace"
